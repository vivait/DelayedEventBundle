language: php

services:
  - rabbitmq

php:
  - 5.4
  - 5.5
  - 5.6
  - 7.0
  - 7.1

cache:
  directories:
    - $HOME/.composer/cache

matrix:
  fast_finish: true
  allow_failures:
    - php: 7.0
    - php: 7.1

before_install:
  - composer self-update
  - composer clear-cache
  
install:
  - export COMPOSER_ROOT_VERSION=dev-master
  - php -d memory_limit=-1 $(which composer) update --no-interaction --no-ansi --no-progress --no-suggest --optimize-autoloader --prefer-stable

before_script:
  - echo "<?php if (PHP_VERSION_ID >= 50400) echo ',@php5.4';" > php_version_tags.php

script:
   - bin/phpspec run --format=pretty
   - bin/phpunit --verbose
